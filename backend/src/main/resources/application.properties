# ===========================
# Server Configuration
# ===========================
server.port=8080

# ===========================
# MySQL Database Configuration
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/falcons_logistics?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate Configuration
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# JWT Configuration
# ===========================
app.jwt.secret=Falcons2025SecretKeyForJWTAuthenticationAndAuthorizationSystemThatIsLongEnoughForHS256
app.jwt.expiration-ms=86400000

# ===========================
# Default Users (Seeded on Startup)
# ===========================
app.default-users.ceo.name=CEO Admin
app.default-users.ceo.email=ceo@falcons.com
app.default-users.ceo.password=Ceo@123

app.default-users.super-admin.name=Super Admin
app.default-users.super-admin.email=superadmin@falcons.com
app.default-users.super-admin.password=Super@123

app.default-users.admin.name=Admin User
app.default-users.admin.email=admin@falcons.com
app.default-users.admin.password=Admin@123

# ===========================
# Logging
# ===========================
logging.level.com.falcons.logistics=DEBUG
logging.level.org.springframework.security=DEBUG
